name: smooth_toast
description: A customizable top/bottom overlay toast for Flutter with themed presets, action button support, and smooth animations.
version: 0.1.0
homepage: https://github.com/eliazv/smooth_toast
repository: https://github.com/eliazv/smooth_toast
issue_tracker: https://github.com/eliazv/smooth_toast/issues
topics:
  - toast
  - snackbar
  - notification
  - flutter
  - ui

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
